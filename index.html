<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rehab Budget">
<title>Rehab Budget Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:   #1a3a5c;
  --blue:   #2563a8;
  --orange: #c55a11;
  --yellow: #fffbe6;
  --green:  #1b5e20;
  --gbg:    #e8f5e9;
  --lb:     #eef5fb;
  --bg:     #f0f4fa;
  --card:   #ffffff;
  --border: #d8e2ef;
  --text:   #0e1d30;
  --muted:  #6b7d92;
  --mono:   'DM Mono', monospace;
  --sans:   'Outfit', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);overflow:hidden;-webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* TOP BAR */
.topbar{background:var(--navy);padding:12px 16px 10px;padding-top:calc(12px + env(safe-area-inset-top,0px));flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.tb-left h1{font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1}
.tb-left p{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--mono);margin-top:2px}
.tb-right{text-align:right}
.tb-right .amt{font-family:var(--mono);font-size:19px;font-weight:500;color:#fff;display:block;line-height:1}
.tb-right .lbl{font-size:9px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.5px}

/* SEARCH */
.searchbar{background:var(--navy);padding:0 14px 12px;display:flex;gap:8px;flex-shrink:0}
.sw{position:relative;flex:1}
.sw-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:rgba(255,255,255,.35);pointer-events:none}
.sw input{width:100%;height:40px;background:rgba(255,255,255,.11);border:1.5px solid rgba(255,255,255,.14);border-radius:10px;color:#fff;font-family:var(--sans);font-size:15px;padding:0 10px 0 34px;outline:none;-webkit-appearance:none}
.sw input::placeholder{color:rgba(255,255,255,.3)}
.sw input:focus{background:rgba(255,255,255,.17);border-color:rgba(255,255,255,.35)}
.sw-clear{display:none;background:rgba(255,255,255,.17);border:none;border-radius:10px;color:#fff;font-size:17px;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sw-clear.vis{display:flex}

/* CHIPS */
.chips{background:var(--card);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;height:29px;padding:0 12px;border:1.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;background:var(--bg);color:var(--muted);cursor:pointer;white-space:nowrap;display:flex;align-items:center;-webkit-user-select:none;user-select:none;transition:all .12s}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff}

/* STATS */
.stats{background:var(--lb);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;flex-shrink:0}
.stat{flex:1;text-align:center}
.stat+.stat{border-left:1px solid var(--border)}
.stat .sv{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--navy);display:block;line-height:1}
.stat .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;display:block}

/* LIST */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.ri{padding:7px 16px 3px;font-family:var(--mono);font-size:10px;color:var(--muted)}
.ri span{color:var(--blue);font-weight:500}

/* TRADE GROUP */
.tg-hdr{position:sticky;top:0;z-index:10;background:var(--navy);color:#fff;padding:8px 15px;display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.tg-hdr .th-ch{font-size:10px;opacity:.55;transition:transform .2s;flex-shrink:0}
.tg-hdr.col .th-ch{transform:rotate(-90deg)}
.tg-hdr .th-nm{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.45px;flex:1}
.tg-hdr .th-tt{font-family:var(--mono);font-size:11px;color:#7dd3fc}
.st-hdr{padding:5px 15px;background:#eaeff7;font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;border-left:3px solid var(--blue)}

/* ITEM CARD */
.card{background:var(--card);border-bottom:1px solid var(--border);padding:11px 15px;display:flex;flex-direction:column;gap:8px;transition:background .1s}
.card.hq{background:#f0faf0;border-left:3px solid #2e7d32}
.card.excl{opacity:.38}

.c-top{display:flex;align-items:flex-start;gap:10px}
.c-chk{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);transition:all .12s}
.c-chk.on{background:var(--blue);border-color:var(--blue)}
.c-chk.on::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.c-info{flex:1;min-width:0}
.c-desc{font-size:13px;font-weight:600;color:var(--text);line-height:1.35}
.c-spec{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:2px;line-height:1.3}
.c-note{font-size:10px;color:var(--orange);font-style:italic;margin-top:2px}
.c-edit-btn{width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:0;transition:all .12s}
.c-edit-btn:active{background:var(--blue);border-color:var(--blue);color:#fff}
.c-edit-btn.active-edit{background:var(--orange);border-color:var(--orange);color:#fff}

.c-bot{display:flex;align-items:center;gap:7px}
.c-rates{flex:1;display:flex;flex-direction:column;gap:2px}
.rate-row{display:flex;gap:5px;align-items:center}
.rb{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;cursor:pointer;transition:all .1s}
.rb.m{background:#e8f5e9;color:#1b5e20}
.rb.l{background:#e3f2fd;color:#0d47a1}
.rb.m.editing{background:#1b5e20;color:#fff;box-shadow:0 0 0 2px #1b5e20}
.rb.l.editing{background:#0d47a1;color:#fff;box-shadow:0 0 0 2px #0d47a1}
.rb.modified{position:relative}
.rb.modified::after{content:'✎';position:absolute;top:-4px;right:-4px;font-size:8px;background:var(--orange);color:#fff;border-radius:50%;width:12px;height:12px;display:flex;align-items:center;justify-content:center;line-height:12px}
.rate-unit{font-family:var(--mono);font-size:9px;color:var(--muted)}

/* PRICE EDITOR */
.price-editor{background:#f8faff;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;display:none;flex-direction:column;gap:6px;margin-top:2px}
.price-editor.open{display:flex}
.pe-row{display:flex;align-items:center;gap:8px}
.pe-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;min-width:52px;flex-shrink:0}
.pe-input{flex:1;height:32px;border:1.5px solid var(--border);border-radius:7px;font-family:var(--mono);font-size:13px;font-weight:500;padding:0 8px;outline:none;background:#fff;color:var(--navy);transition:border-color .15s}
.pe-input:focus{border-color:var(--blue)}
.pe-input.mat-inp:focus{border-color:#2e7d32}
.pe-input.lab-inp:focus{border-color:#0d47a1}
.pe-unit{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
.pe-reset{height:32px;padding:0 10px;border:1.5px solid var(--border);border-radius:7px;font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);cursor:pointer;flex-shrink:0;white-space:nowrap}
.pe-reset:active{background:var(--orange);border-color:var(--orange);color:#fff}

/* QTY */
.c-qty{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qb{width:34px;height:34px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:19px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;flex-shrink:0;transition:all .1s;line-height:1}
.qb:active{background:var(--blue);border-color:var(--blue);color:#fff;transform:scale(.9)}
.qi{width:52px;height:34px;border:1.5px solid var(--border);border-radius:8px;text-align:center;font-family:var(--mono);font-size:15px;font-weight:500;color:var(--navy);background:#fff;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
.qi:focus{border-color:var(--blue)}
.qi.hv{background:var(--yellow);border-color:#c8a000;color:#7a5800}
.c-lt{font-family:var(--mono);font-size:12px;font-weight:500;text-align:right;min-width:68px;flex-shrink:0}
.c-lt.hv{color:var(--green);font-weight:700}
.c-lt.z{color:#ccc}

/* BOTTOM NAV */
.bnav{background:var(--card);border-top:1px solid var(--border);padding:8px 14px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));display:flex;gap:7px;flex-shrink:0}
.nb{flex:1;height:44px;border:none;border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-user-select:none;user-select:none;transition:all .12s}
.nb:active{transform:scale(.95);opacity:.82}
.nb.sec{background:var(--bg);color:var(--navy);border:1.5px solid var(--border)}
.nb.pri{background:var(--orange);color:#fff}
.nb.warn{background:#1b5e20;color:#fff}

/* BOTTOM SHEETS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.open{opacity:1;pointer-events:auto}
.bs{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:18px 18px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0px)}
.bs.open{transform:translateY(0)}
.bs-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0;flex-shrink:0}
.bs-title{padding:12px 18px 8px;font-size:16px;font-weight:800;color:var(--navy);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.bs-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
.bs-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:0 14px 14px}

/* STATE GRID */
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:4px 0 14px}
.sc{border:2px solid var(--border);border-radius:12px;padding:11px;cursor:pointer;text-align:center;background:var(--bg);transition:all .14s}
.sc.active{border-color:var(--blue);background:var(--blue);color:#fff}
.sc .scc{font-family:var(--mono);font-size:17px;font-weight:500;display:block;line-height:1}
.sc .scn{font-size:9px;opacity:.65;margin-top:2px;display:block}
.sc .scm{font-family:var(--mono);font-size:8px;margin-top:5px;opacity:.55;display:block}
.sc.active .scm{opacity:.82}

/* SUMMARY SHEET */
.sum-trade{margin-bottom:5px;border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.sum-thdr{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--lb);font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.3px}
.sum-thdr .ta{font-family:var(--mono);font-size:12px;font-weight:500}
.sum-dl{display:flex;justify-content:space-between;padding:4px 12px;font-size:10px;color:var(--muted);border-top:1px solid #f0f2f5}
.sum-dl .da{font-family:var(--mono);font-weight:500;color:var(--text)}
.sum-tots{margin-top:12px;background:var(--lb);border-radius:12px;padding:13px 15px;border:1px solid var(--border)}
.str{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
.str .tl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.str .ta{font-family:var(--mono);font-size:13px;color:var(--text)}
.sgr{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:2px solid var(--navy)}
.sgr .gl{font-size:14px;font-weight:800;color:var(--navy)}
.sgr .ga{font-family:var(--mono);font-size:21px;font-weight:500;color:var(--navy)}
.sco{display:flex;justify-content:space-between;margin-top:3px;opacity:.55}
.sco .cl{font-size:10px;color:var(--muted)}
.sco .ca{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* RESET BANNER */
.reset-banner{background:#fff3e0;border:1.5px solid #ffb74d;border-radius:8px;padding:8px 12px;margin-bottom:8px;display:none;align-items:center;gap:8px;font-size:11px;color:#7a4100}
.reset-banner.vis{display:flex}
.reset-banner button{margin-left:auto;padding:4px 10px;background:#ff6d00;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}

mark{background:#fff176;color:inherit;border-radius:2px;padding:0 1px}
.empty{text-align:center;padding:50px 24px;color:var(--muted)}
.empty .ei{font-size:36px;margin-bottom:10px;opacity:.3}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#c5cdd8;border-radius:10px}
</style>
</head>

<div class="app">

<div class="topbar">
  <div class="tb-left"><h1>Rehab Budget</h1><p>Hawaii RE Investments</p></div>
  <div class="tb-right"><span class="amt" id="tt">$0</span><span class="lbl">Total Rehab</span></div>
</div>

<div class="searchbar">
  <div class="sw">
    <span class="sw-icon">🔍</span>
    <input id="srch" type="search" placeholder="Search 418 items..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <button class="sw-clear" id="sw-clear" onclick="clrSrch()">✕</button>
</div>

<div class="chips" id="chips">
  <div class="chip active" onclick="setF('all',this)">All</div>
  <div class="chip" onclick="setF('qty',this)">✓ With Qty</div>
  <div class="chip" onclick="setF('mod',this)">✎ Modified</div>
</div>

<div class="stats">
  <div class="stat"><span class="sv" id="s0">0</span><span class="sl">Active</span></div>

  <div class="stat"><span class="sv" id="s3">HI</span><span class="sl">Market</span></div>
</div>

<div class="scroll" id="scroll">
  <div class="ri" id="ri"></div>
  <div id="list"></div>
</div>

<div class="bnav">
  <button class="nb sec" onclick="openBS('bs-state')">🌏 State</button>
  <button class="nb sec" onclick="openBS('bs-sum')">📊 Summary</button>
  <button class="nb pri" onclick="exportXLSX()">⬇ Export</button>
</div>
</div>

<!-- STATE SHEET -->
<div class="ov" id="ov-bs-state" onclick="closeBS('bs-state')"></div>
<div class="bs" id="bs-state">
  <div class="bs-handle"></div>
  <div class="bs-title">Select Market<button class="bs-close" onclick="closeBS('bs-state')">✕</button></div>
  <div class="bs-body"><div class="sg" id="state-grid"></div></div>
</div>

<!-- SUMMARY SHEET -->
<div class="ov" id="ov-bs-sum" onclick="closeBS('bs-sum')"></div>
<div class="bs" id="bs-sum">
  <div class="bs-handle"></div>
  <div class="bs-title">Cost Summary<button class="bs-close" onclick="closeBS('bs-sum')">✕</button></div>
  <div class="bs-body" id="sum-body"></div>
</div>

const STATES = [
  {c:'BASE',n:'Midwest',  l:1.00,m:1.00},
  {c:'CA',  n:'California',l:1.45,m:1.22},
  {c:'AZ',  n:'Arizona',  l:1.05,m:1.08},
  {c:'FL',  n:'Florida',  l:1.02,m:1.08},
  {c:'HI',  n:'Hawaii',   l:1.55,m:1.65},
  {c:'NV',  n:'Nevada',   l:1.12,m:1.10},
  {c:'TX',  n:'Texas',    l:0.95,m:1.00},
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let lMult = 1.55, mMult = 1.65, activeState = 'HI';
let searchQ = '', filterMode = 'all';

// Per-item state: row -> {qty, inc, matOvr, labOvr}
// matOvr/labOvr = null (use base×mult) or number (user override)
const IS = {};
BASE.forEach(i => {
  IS[i[0]] = {qty: 0, inc: i[9], matOvr: null, labOvr: null};
});

const TRADE_ORDER = [...new Set(BASE.map(i => i[2]))]
  .sort((a,b) => parseInt(a) - parseInt(b));
const collapsed = new Set();

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt  = n => '$' + Math.round(n).toLocaleString();
const fmtD = n => n === 0 ? '' : '$' + n.toFixed(2);
const fmtI = n => n === 0 ? '' : '$' + parseFloat(n.toFixed(4));

function getMatRate(item) {
  const s = IS[item[0]];
  return s.matOvr !== null ? s.matOvr : item[7] * mMult;
}
function getLabRate(item) {
  const s = IS[item[0]];
  return s.labOvr !== null ? s.labOvr : item[8] * lMult;
}
function getPrice(item) {
  const s = IS[item[0]];
  const m = getMatRate(item) * s.qty;
  const l = getLabRate(item) * s.qty;
  return {m, l, t: m+l};
}
function isModified(row) {
  return IS[row].matOvr !== null || IS[row].labOvr !== null;
}

function hl(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function getFiltered() {
  return BASE.filter(item => {
    const s = IS[item[0]];
    if (filterMode === 'qty' && s.qty === 0) return false;
    if (filterMode === 'mod' && !isModified(item[0])) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return item[4].toLowerCase().includes(q) ||
             item[5].toLowerCase().includes(q) ||
             item[2].toLowerCase().includes(q) ||
             item[3].toLowerCase().includes(q) ||
             (item[10]||'').toLowerCase().includes(q);
    }
    return true;
  });
}

function setF(mode, el) {
  filterMode = mode;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ─── STATE SELECT ─────────────────────────────────────────────────────────────
const stateGrid = document.getElementById('state-grid');
STATES.forEach(s => {
  const c = document.createElement('div');
  c.className = 'sc' + (s.c === 'HI' ? ' active' : '');
  c.dataset.code = s.c;
  c.innerHTML = `<span class="scc">${s.c}</span><span class="scn">${s.n}</span><span class="scm">L×${s.l.toFixed(2)} M×${s.m.toFixed(2)}</span>`;
  c.addEventListener('click', () => {
    lMult = s.l; mMult = s.m; activeState = s.c;
    document.querySelectorAll('.sc').forEach(x => x.classList.toggle('active', x.dataset.code === s.c));
    document.getElementById('s3').textContent = s.c;
    closeBS('bs-state');
    render();
  });
  stateGrid.appendChild(c);

// ─── QTY ─────────────────────────────────────────────────────────────────────
function adjQ(row, d) {
  IS[row].qty = Math.max(0, IS[row].qty + d);
  if (IS[row].qty > 0) IS[row].inc = 1;
  updateRow(row);
  updateStats();
}
function setQ(row, v) {
  IS[row].qty = Math.max(0, parseInt(v) || 0);
  if (IS[row].qty > 0) IS[row].inc = 1;
  updateRow(row);
  updateStats();
}
function togInc(row) {
  IS[row].inc = IS[row].inc === 1 ? 0 : 1;
  updateRow(row);
  updateStats();
}

// ─── PRICE EDITING ───────────────────────────────────────────────────────────
let openEditorRow = null;

function toggleEditor(row) {
  const el = document.querySelector(`[data-row="${row}"]`);
  if (!el) return;
  const pe = el.querySelector('.price-editor');
  const btn = el.querySelector('.c-edit-btn');
  if (openEditorRow !== null && openEditorRow !== row) {
    const prevEl = document.querySelector(`[data-row="${openEditorRow}"]`);
    if (prevEl) {
      prevEl.querySelector('.price-editor').classList.remove('open');
      prevEl.querySelector('.c-edit-btn').classList.remove('active-edit');
    }
  }
  const isOpen = pe.classList.contains('open');
  pe.classList.toggle('open', !isOpen);
  btn.classList.toggle('active-edit', !isOpen);
  openEditorRow = isOpen ? null : row;
  if (!isOpen) {
    const item = BASE.find(i => i[0] === row);
    const s = IS[row];
    const matInp = pe.querySelector('.mat-inp');
    const labInp = pe.querySelector('.lab-inp');
    matInp.value = s.matOvr !== null ? s.matOvr : (item[7] * mMult).toFixed(2);
    labInp.value = s.labOvr !== null ? s.labOvr : (item[8] * lMult).toFixed(2);
    matInp.focus();
  }
}

function applyPrice(row, type, val) {
  const n = parseFloat(val);
  if (isNaN(n) || n < 0) return;
  if (type === 'mat') IS[row].matOvr = n === 0 && BASE.find(i=>i[0]===row)[7] === 0 ? null : n;
  else IS[row].labOvr = n === 0 && BASE.find(i=>i[0]===row)[8] === 0 ? null : n;
  updateRow(row);
  updateStats();
}

function resetPrice(row) {
  IS[row].matOvr = null;
  IS[row].labOvr = null;
  const el = document.querySelector(`[data-row="${row}"]`);
  if (el) {
    const item = BASE.find(i => i[0] === row);
    const pe = el.querySelector('.price-editor');
    pe.querySelector('.mat-inp').value = (item[7] * mMult).toFixed(2);
    pe.querySelector('.lab-inp').value = (item[8] * lMult).toFixed(2);
  }
  updateRow(row);
  updateStats();
}

// ─── UPDATE SINGLE ROW ────────────────────────────────────────────────────────
function updateRow(row) {
  const el = document.querySelector(`[data-row="${row}"]`);
  if (!el) return;
  const item = BASE.find(i => i[0] === row);
  if (!item) return;
  const s = IS[row];
  const p = getPrice(item);
  const hq = s.qty > 0;
  const mod = isModified(row);

  el.className = 'card' + (hq ? ' hq' : '') + (s.inc !== 1 ? ' excl' : '');

  el.querySelector('.c-chk').className = 'c-chk' + (s.inc === 1 ? ' on' : '');

  // Update rate badges
  const mR = getMatRate(item);
  const lR = getLabRate(item);
  const mBadge = el.querySelector('.rb.m');
  const lBadge = el.querySelector('.rb.l');
  if (mBadge) {
    mBadge.textContent = 'Mat ' + (mR > 0 ? fmtD(mR) : '—');
    mBadge.classList.toggle('modified', IS[row].matOvr !== null);
  }
  if (lBadge) {
    lBadge.textContent = 'Labor ' + (lR > 0 ? fmtD(lR) : '—');
    lBadge.classList.toggle('modified', IS[row].labOvr !== null);
  }

  el.querySelector('.c-edit-btn').classList.toggle('active-edit', IS[row].matOvr !== null || IS[row].labOvr !== null);

  const qi = el.querySelector('.qi');
  qi.value = s.qty;
  qi.className = 'qi' + (hq ? ' hv' : '');

  const lt = el.querySelector('.c-lt');
  if (p.t > 0) { lt.textContent = fmt(p.t); lt.className = 'c-lt hv'; }
  else { lt.textContent = '—'; lt.className = 'c-lt z'; }
}

// ─── BUILD CARD ───────────────────────────────────────────────────────────────
function buildCard(item) {
  const s = IS[item[0]];
  const p = getPrice(item);
  const hq = s.qty > 0;
  const mR = getMatRate(item);
  const lR = getLabRate(item);
  const mod = isModified(item[0]);

  let rates = '';
  if (item[7] > 0 || s.matOvr !== null)
    rates += `<div class="rate-row"><span class="rb m${IS[item[0]].matOvr!==null?' modified':''}">Mat ${fmtD(mR)||'—'}</span><span class="rate-unit">/${item[6]}</span></div>`;
  if (item[8] > 0 || s.labOvr !== null)
    rates += `<div class="rate-row"><span class="rb l${IS[item[0]].labOvr!==null?' modified':''}">Labor ${fmtD(lR)||'—'}</span><span class="rate-unit">/${item[6]}</span></div>`;
  if (!rates) rates = `<span class="rate-unit" style="font-size:9px;color:#ccc">Get bid / enter price below</span>`;

  const card = document.createElement('div');
  card.className = 'card' + (hq ? ' hq' : '') + (s.inc !== 1 ? ' excl' : '');
  card.dataset.row = item[0];

  const matVal = s.matOvr !== null ? s.matOvr : (item[7] * mMult).toFixed(2);
  const labVal = s.labOvr !== null ? s.labOvr : (item[8] * lMult).toFixed(2);

  card.innerHTML = `
    <div class="c-top">
      <div class="c-chk${s.inc===1?' on':''}"></div>
      <div class="c-info">
        <div class="c-desc">${hl(item[4], searchQ)}</div>
        ${item[5] ? `<div class="c-spec">${hl(item[5], searchQ)}</div>` : ''}
        ${item[10] ? `<div class="c-note">${item[10]}</div>` : ''}
      </div>
      <div class="c-edit-btn${mod?' active-edit':''}" title="Edit prices">✎</div>
    </div>
    <div class="price-editor">
      <div class="pe-row">
        <span class="pe-label">Material</span>
        <input class="pe-input mat-inp" type="number" min="0" step="0.01" value="${matVal}" placeholder="0.00">
        <span class="pe-unit">per ${item[6]}</span>
        <button class="pe-reset" onclick="resetPrice(${item[0]})">Reset</button>
      </div>
      <div class="pe-row">
        <span class="pe-label">Labor</span>
        <input class="pe-input lab-inp" type="number" min="0" step="0.01" value="${labVal}" placeholder="0.00">
        <span class="pe-unit">per ${item[6]}</span>
      </div>
    </div>
    <div class="c-bot">
      <div class="c-rates">${rates}</div>
      <div class="c-qty">
        <div class="qb" onclick="adjQ(${item[0]},-1)">−</div>
        <input class="qi${hq?' hv':''}" type="number" min="0" value="${s.qty}"
               onchange="setQ(${item[0]},this.value)" onfocus="this.select()">
        <div class="qb" onclick="adjQ(${item[0]},1)">+</div>
      </div>
      <div class="c-lt${p.t>0?' hv':' z'}">${p.t>0?fmt(p.t):'—'}</div>
    </div>
  `;

  card.querySelector('.c-chk').addEventListener('click', () => togInc(item[0]));
  card.querySelector('.c-edit-btn').addEventListener('click', () => toggleEditor(item[0]));

  const matInp = card.querySelector('.mat-inp');
  const labInp = card.querySelector('.lab-inp');
  matInp.addEventListener('change', e => applyPrice(item[0], 'mat', e.target.value));
  matInp.addEventListener('blur',   e => applyPrice(item[0], 'mat', e.target.value));
  labInp.addEventListener('change', e => applyPrice(item[0], 'lab', e.target.value));
  labInp.addEventListener('blur',   e => applyPrice(item[0], 'lab', e.target.value));

  return card;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const items = getFiltered();
  document.getElementById('ri').innerHTML =
    `Showing <span>${items.length}</span> of <span>${BASE.length}</span> items`;

  const list = document.getElementById('list');
  list.innerHTML = '';

  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><div class="ei">🔍</div><p>No items match.</p></div>';
    updateStats(); return;
  }

  const byTrade = {};
  items.forEach(item => {
    if (!byTrade[item[2]]) byTrade[item[2]] = {};
    const st = item[3] || '';
    if (!byTrade[item[2]][st]) byTrade[item[2]][st] = [];
    byTrade[item[2]][st].push(item);
  });

  TRADE_ORDER.forEach(trade => {
    if (!byTrade[trade]) return;
    const subtrades = byTrade[trade];
    const all = Object.values(subtrades).flat();
    const tradeTot = all.reduce((s,i) => s + getPrice(i).t, 0);
    const col = collapsed.has(trade);

    const g = document.createElement('div');
    const h = document.createElement('div');
    h.className = 'tg-hdr' + (col ? ' col' : '');
    h.innerHTML = `<span class="th-ch">▾</span><span class="th-nm">${trade}</span>${tradeTot>0?`<span class="th-tt">${fmt(tradeTot)}</span>`:''}`;
    h.addEventListener('click', () => {
      if (collapsed.has(trade)) collapsed.delete(trade);
      else collapsed.add(trade);
      render();
    });
    g.appendChild(h);

    if (!col) {
      Object.entries(subtrades).forEach(([st, its]) => {
        if (st) {
          const sh = document.createElement('div');
          sh.className = 'st-hdr';
          sh.textContent = st;
          g.appendChild(sh);
        }
        its.forEach(item => g.appendChild(buildCard(item)));
      });
    }
    list.appendChild(g);
  });

  updateStats();
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  let tM=0, tL=0, act=0;
  BASE.forEach(item => {
    const p = getPrice(item);
    tM += p.m; tL += p.l;
    if (p.t > 0) act++;
  });
  const tot = tM + tL;
  document.getElementById('tt').textContent = fmt(tot);
  document.getElementById('s0').textContent = act;
  document.getElementById('s1').textContent = fmt(tM);
  document.getElementById('s2').textContent = fmt(tL);
}

// ─── SUMMARY ──────────────────────────────────────────────────────────────────
function buildSummary() {
  const body = document.getElementById('sum-body');
  body.innerHTML = '';
  let gM=0, gL=0;

  TRADE_ORDER.forEach(t => {
    const its = BASE.filter(i => i[2] === t);
    const m = its.reduce((s,i) => s + getPrice(i).m, 0);
    const l = its.reduce((s,i) => s + getPrice(i).l, 0);
    const tot = m + l;
    if (tot === 0) return;
    gM += m; gL += l;
    const short = t.replace(/^\d+\.\s+/, '');
    const d = document.createElement('div');
    d.className = 'sum-trade';
    d.innerHTML = `
      <div class="sum-thdr"><span>${short}</span><span class="ta">${fmt(tot)}</span></div>
      ${m>0?`<div class="sum-dl"><span>Materials</span><span class="da">${fmt(m)}</span></div>`:''}
      ${l>0?`<div class="sum-dl"><span>Labor</span><span class="da">${fmt(l)}</span></div>`:''}
    `;
    body.appendChild(d);
  });

  const grand = gM + gL;
  const td = document.createElement('div');
  td.className = 'sum-tots';
  td.innerHTML = `
    <div class="str"><span class="tl">Materials</span><span class="ta">${fmt(gM)}</span></div>
    <div class="str"><span class="tl">Labor</span><span class="ta">${fmt(gL)}</span></div>
    <div class="sgr"><span class="gl">TOTAL REHAB</span><span class="ga">${fmt(grand)}</span></div>
    <div class="sco"><span class="cl">+ 10% Contingency</span><span class="ca">${fmt(grand*0.1)}</span></div>
  `;
  body.appendChild(td);
}

// ─── BOTTOM SHEETS ────────────────────────────────────────────────────────────
function openBS(id) {

}

}

  // Row heights
  ws1['!rows'] = [
    {hpt:30},{hpt:18},{hpt:8},{hpt:28},
    ...ws1Data.slice(4).map(() => ({hpt:18}))
  ];

  // Merge title rows across all 12 columns
  ws1['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:11}},
    {s:{r:1,c:0},e:{r:1,c:11}},
  ];

  XLSX.utils.book_append_sheet(wb, ws1, 'Rehab Budget Detail');

  // ── SHEET 2: TRADE SUMMARY ──
  const ws2Data = [];
  ws2Data.push([
    { v:'REHAB BUDGET — TRADE SUMMARY', s:{font:{bold:true,sz:14,color:{rgb:WHITE}},
        fill:{fgColor:{rgb:NAVY}},alignment:{horizontal:'left',vertical:'center'}} },
    {v:'',s:{fill:{fgColor:{rgb:NAVY}}}},
    {v:'',s:{fill:{fgColor:{rgb:NAVY}}}},
    {v:'',s:{fill:{fgColor:{rgb:NAVY}}}},
  ]);
  ws2Data.push([
    { v:`Market: ${STATES.find(s=>s.c===activeState)?.n||activeState}  |  Labor ×${lMult.toFixed(2)}  |  Material ×${mMult.toFixed(2)}`,
      s:{font:{italic:true,sz:9,color:{rgb:'FF444444'}},fill:{fgColor:{rgb:'FFF5F8FF'}}} },
    {v:'',s:{fill:{fgColor:{rgb:'FFF5F8FF'}}}},
    {v:'',s:{fill:{fgColor:{rgb:'FFF5F8FF'}}}},
    {v:'',s:{fill:{fgColor:{rgb:'FFF5F8FF'}}}},
  ]);
  ws2Data.push(Array(4).fill({v:''}));

  const sumHdrs = ['Trade','Materials','Labor','Total'];
  ws2Data.push(sumHdrs.map(h => ({
    v:h, s:{font:{bold:true,sz:10,color:{rgb:WHITE}},fill:{fgColor:{rgb:NAVY}},
             alignment:{horizontal:h==='Trade'?'left':'right',vertical:'center'},
             border:{top:{style:'medium'},bottom:{style:'medium'},left:{style:'medium'},right:{style:'medium'}}}
  })));

  let sumGM=0, sumGL=0;
  TRADE_ORDER.forEach((t,ti) => {
    const its = BASE.filter(i => i[2]===t);
    const m = its.reduce((s,i)=>s+getPrice(i).m,0);
    const l = its.reduce((s,i)=>s+getPrice(i).l,0);
    const tot = m+l;
    if (tot===0) return;
    sumGM+=m; sumGL+=l;
    const shade = ti%2===0?WHITE:LBGC;
    const bord = {top:{style:'thin',color:{rgb:'FFD8E2EF'}},bottom:{style:'thin',color:{rgb:'FFD8E2EF'}},
                  left:{style:'thin',color:{rgb:'FFD8E2EF'}},right:{style:'thin',color:{rgb:'FFD8E2EF'}}};
    ws2Data.push([
      {v:t,s:{font:{sz:10},fill:{fgColor:{rgb:shade}},border:bord,alignment:{horizontal:'left',vertical:'center'}}},
      {v:m,t:'n',s:{font:{sz:10,color:{rgb:DARKGRN}},fill:{fgColor:{rgb:GBGC}},border:bord,numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
      {v:l,t:'n',s:{font:{sz:10,color:{rgb:DARKBLU}},fill:{fgColor:{rgb:LBGC}},border:bord,numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
      {v:tot,t:'n',s:{font:{sz:10,bold:true},fill:{fgColor:{rgb:shade}},border:bord,numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
    ]);
  });

  const sumGrand = sumGM+sumGL;
  ws2Data.push(Array(4).fill({v:''}));
  ws2Data.push([
    {v:'TOTAL REHAB',s:{font:{bold:true,sz:12,color:{rgb:WHITE}},fill:{fgColor:{rgb:NAVY}},alignment:{horizontal:'left',vertical:'center'}}},
    {v:sumGM,t:'n',s:{font:{bold:true,sz:11,color:{rgb:WHITE}},fill:{fgColor:{rgb:NAVY}},numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
    {v:sumGL,t:'n',s:{font:{bold:true,sz:11,color:{rgb:WHITE}},fill:{fgColor:{rgb:NAVY}},numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
    {v:sumGrand,t:'n',s:{font:{bold:true,sz:13,color:{rgb:WHITE}},fill:{fgColor:{rgb:NAVY}},numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
  ]);
  ws2Data.push([
    {v:'+ 10% Contingency',s:{font:{italic:true,sz:10,color:{rgb:'FF7A5800'}},fill:{fgColor:{rgb:YELLC}},alignment:{horizontal:'left',vertical:'center'}}},
    {v:'',s:{fill:{fgColor:{rgb:YELLC}}}},{v:'',s:{fill:{fgColor:{rgb:YELLC}}}},
    {v:sumGrand*.1,t:'n',s:{font:{bold:true,sz:11,color:{rgb:'FF7A5800'}},fill:{fgColor:{rgb:YELLC}},numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
  ]);
  ws2Data.push([
    {v:'TOTAL WITH CONTINGENCY',s:{font:{bold:true,sz:13,color:{rgb:WHITE}},fill:{fgColor:{rgb:ORANGC}},alignment:{horizontal:'left',vertical:'center'}}},
    {v:'',s:{fill:{fgColor:{rgb:ORANGC}}}},{v:'',s:{fill:{fgColor:{rgb:ORANGC}}}},
    {v:sumGrand*1.1,t:'n',s:{font:{bold:true,sz:14,color:{rgb:WHITE}},fill:{fgColor:{rgb:ORANGC}},numFmt:'$#,##0',alignment:{horizontal:'right',vertical:'center'}}},
  ]);

  const ws2 = XLSX.utils.aoa_to_sheet(ws2Data);
  ws2['!cols'] = [{wch:40},{wch:16},{wch:16},{wch:16}];
  ws2['!merges'] = [{s:{r:0,c:0},e:{r:0,c:3}},{s:{r:1,c:0},e:{r:1,c:3}}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Trade Summary');

  // Write
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `rehab_budget_${activeState}_${date}.xlsx`);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
